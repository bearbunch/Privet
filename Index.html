<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BearBunch</title>

<style>
    :root {
        --bg: #f5f7fa;
        --text: #222;
        --card: #ffffff;
        --primary: #2563eb;
        --secondary: #e5e7eb;
    }

    body.dark {
        --bg: #0f172a;
        --text: #f1f5f9;
        --card: #1e293b;
        --primary: #3b82f6;
        --secondary: #334155;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #dbeafe, #f0f9ff);
        color: var(--text);
        transition: 0.3s;
    }

    body.dark {
        background: linear-gradient(135deg, #020617, #0f172a);
    }

    /* NAVBAR */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: var(--card);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .logo {
        font-weight: bold;
        font-size: 20px;
    }

    .nav-links a {
        margin-left: 15px;
        text-decoration: none;
        color: var(--text);
        font-weight: 500;
    }

    .toggle {
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 6px;
        background: var(--secondary);
    }

    /* MAIN */
    .container {
        text-align: center;
        margin-top: 80px;
        animation: fadeIn 1s ease;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    p {
        color: gray;
        margin-bottom: 30px;
    }

    .btn {
        display: block;
        width: 240px;
        margin: 10px auto;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        border-radius: 8px;
        transition: all 0.25s ease;
    }

    .primary {
        background: var(--primary);
        color: white;
    }

    .primary:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .secondary {
        background: var(--secondary);
        color: var(--text);
    }

    .secondary:hover {
        transform: translateY(-3px) scale(1.02);
    }

    /* ANIMATION */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">🐻 BearBunch</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Shows</a>
        <a href="#">Host</a>
    </div>

    <div class="toggle" onclick="toggleDark()">🌙</div>
</nav>

<!-- MAIN CONTENT -->
<div class="container">
    <h1>Welcome to BearBunch</h1>
    <p>Host and discover amazing shows</p>

    <a class="btn primary" href="https://bearbunch.github.io/host/INDEX.HTML">
        🎤 Host Shows
    </a>

    <a class="btn secondary" href="https://bearbunch.github.io/shows/Index.html">
        🎬 View Shows
    </a>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
